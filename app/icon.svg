<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black background, slight rounding -->
  <rect width="32" height="32" rx="5" fill="#0a0a0a"/>
  <!-- Red sun dot — top right, peeking above cloud -->
  <circle cx="21" cy="10" r="4.5" fill="#FF3030"/>
  <!-- White cloud — overlapping circles + flat-bottom fill -->
  <circle cx="9"  cy="22" r="4"   fill="white"/>
  <circle cx="17" cy="19" r="5.5" fill="white"/>
  <circle cx="23" cy="22" r="3.5" fill="white"/>
  <rect   x="5"   y="22"  width="22" height="5" fill="white"/>
</svg>
